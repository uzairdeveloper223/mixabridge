<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 128 128" width="128" height="128">
  <defs>
    <linearGradient id="bg" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#2C3E50"/>
      <stop offset="100%" stop-color="#1A2535"/>
    </linearGradient>
    <linearGradient id="bridgeGrad" x1="0%" y1="0%" x2="0%" y2="100%">
      <stop offset="0%" stop-color="#C8A882" stop-opacity="0"/>
      <stop offset="40%" stop-color="#C8A882" stop-opacity="0.7"/>
      <stop offset="60%" stop-color="#C8A882" stop-opacity="0.7"/>
      <stop offset="100%" stop-color="#C8A882" stop-opacity="0"/>
    </linearGradient>
    <clipPath id="leftHalf">
      <rect x="0" y="0" width="63" height="128"/>
    </clipPath>
    <clipPath id="rightHalf">
      <rect x="65" y="0" width="63" height="128"/>
    </clipPath>
  </defs>

  <!-- Background -->
  <rect width="128" height="128" rx="22" fill="url(#bg)"/>
  <rect width="128" height="128" rx="22" fill="none"
        stroke="#FFFFFF" stroke-width="1" stroke-opacity="0.06"/>

  <!-- ── LEFT HALF — T-pose / source (cool slate-blue) ── -->
  <g clip-path="url(#leftHalf)">
    <g stroke="#7FA8CC" stroke-width="2.3" stroke-linecap="round" fill="none" opacity="0.8">
      <line x1="64" y1="32" x2="64" y2="70"/>
      <line x1="64" y1="37" x2="34" y2="45"/>
      <line x1="34" y1="45" x2="20" y2="63"/>
      <line x1="20" y1="63" x2="14" y2="78"/>
      <line x1="58" y1="70" x2="50" y2="92"/>
      <line x1="50" y1="92" x2="47" y2="110"/>
    </g>
    <g fill="#7FA8CC" opacity="0.85">
      <circle cx="34" cy="45" r="3.4"/>
      <circle cx="20" cy="63" r="2.7"/>
      <circle cx="14" cy="78" r="2.2"/>
      <circle cx="50" cy="92" r="2.9"/>
      <circle cx="47" cy="110" r="2.3"/>
    </g>
  </g>

  <!-- ── RIGHT HALF — animated pose / target (warm amber-sand) ── -->
  <g clip-path="url(#rightHalf)">
    <g stroke="#E8A96A" stroke-width="2.3" stroke-linecap="round" fill="none">
      <line x1="64" y1="32" x2="64" y2="70"/>
      <line x1="64" y1="37" x2="94" y2="45"/>
      <!-- raised arm -->
      <line x1="94" y1="45" x2="108" y2="30"/>
      <line x1="108" y1="30" x2="116" y2="18"/>
      <line x1="70" y1="70" x2="79" y2="92"/>
      <line x1="79" y1="92" x2="82" y2="110"/>
    </g>
    <g fill="#E8A96A">
      <circle cx="94" cy="45" r="3.4"/>
      <circle cx="108" cy="30" r="2.7"/>
      <circle cx="116" cy="18" r="2.2"/>
      <circle cx="79" cy="92" r="2.9"/>
      <circle cx="82" cy="110" r="2.3"/>
    </g>
  </g>

  <!-- ── SHARED CENTER ELEMENTS ── -->
  <!-- Neck -->
  <line x1="64" y1="23" x2="64" y2="32"
        stroke="#C4A882" stroke-width="2.3" stroke-linecap="round"/>
  <!-- Hip bar -->
  <line x1="58" y1="70" x2="70" y2="70"
        stroke="#C4A882" stroke-width="2.3" stroke-linecap="round"/>
  <!-- Chest node -->
  <circle cx="64" cy="37" r="3.8" fill="#C4A882"/>
  <!-- Hip node -->
  <circle cx="64" cy="70" r="4" fill="#C4A882"/>

  <!-- Head -->
  <circle cx="64" cy="15" r="8.5" fill="none" stroke="#C4A882" stroke-width="2.5"/>
  <circle cx="64" cy="15" r="3.8" fill="#C4A882" opacity="0.55"/>

  <!-- ── CENTER DIVIDER (the "bridge") ── -->
  <line x1="64" y1="6" x2="64" y2="122"
        stroke="url(#bridgeGrad)" stroke-width="1"/>

  <!-- Transfer arrow at mid-torso -->
  <g transform="translate(64, 54)">
    <!-- left dash -->
    <line x1="-10" y1="0" x2="-4" y2="0"
          stroke="#7FA8CC" stroke-width="1.8" stroke-linecap="round" opacity="0.9"/>
    <!-- right arrow -->
    <line x1="3" y1="0" x2="9" y2="0"
          stroke="#E8A96A" stroke-width="1.8" stroke-linecap="round"/>
    <polyline points="6,-3 9.5,0 6,3"
              stroke="#E8A96A" stroke-width="1.8" stroke-linecap="round"
              stroke-linejoin="round" fill="none"/>
    <!-- pivot dot -->
    <circle cx="0" cy="0" r="2.2" fill="#C4A882"/>
  </g>
</svg>